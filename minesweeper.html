<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        td {
            width: 30pt; height: 30pt;
            text-align: center;
            font-size: 20pt;
        }
        .block { background-color: gray; }
        .c1 { color: blue; }
        .c2 { color: green; }
        .c3 { color: red; }
        .c4 { color: purple; }
        .c5 { color: orange; }
        .c6 { color: pink; }
        .c7 { color: brown; }
        .c8 { color: silver; }

        #lobby, #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
            margin-top: 20px;
        }

        .hidden { display: none !important; }

        .menu-btn {
            width: 100%;
            max-width: 420px;
            min-width: 200px;
            padding: 15px;
            margin: 8px 0;
            
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #ranking-container {
            margin-top: 30px;
            display: flex;
            flex-direction: row;
            gap: 15px;           
            width: 100%;
            max-width: 600px;    
            align-items: center;
        }

        .ranking-box {
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 10px;
            width: 100%;       
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }

        .ranking-box h3 {
            margin: 5px 0;
            font-size: 1.1rem;
            border-bottom: 2px solid #eee;
            padding-bottom: 5px;
        }

        .rank-list {
            font-size: 0.9rem;
            color: #666;
            min-height: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        #ui-layer { margin-bottom: 10px; }
        #ui-layer2 { margin-bottom: 30px; }
    </style>
</head>
<body>

    <div id="lobby">
        <h1 style="font-size: 30pt">지뢰찾기</h1>
        <div style="display: flex; gap: 30px">
            <button class="menu-btn" onclick="startGame(10, 8, 10)">Easy<br>(10x8)</button>
            <button class="menu-btn" onclick="startGame(18, 14, 40)">Normal<br>(18x14)</button>
            <button class="menu-btn" onclick="startGame(24, 20, 99)">Hard<br>(24x20)</button>
        </div>
        
        <h2 style="margin-top: 50pt">🏆Ranking🏆</h2>
        <div id="ranking-container">
            <div class="ranking-box" id="rank-easy">
                <h3>🌱 Easy </h3>
                <div class="rank-list">순위 데이터 없음</div>
            </div>
            <div class="ranking-box" id="rank-normal">
                <h3>🌿 Normal </h3>
                <div class="rank-list">순위 데이터 없음</div>
            </div>
            <div class="ranking-box" id="rank-hard">
                <h3>🔥 Hard </h3>
                <div class="rank-list">순위 데이터 없음</div>
            </div>
        </div>
    </div>

    <div id="game-container" class="hidden">
        <span id="info-text" style="font-size: 30pt;"></span>
        <div id="ui-layer">
            <button class="menu-btn" onclick="backToLobby()">로비로 돌아가기</button>
        </div>
        <div id="ui-layer">
            <span id="flag-text" style="font-size: 15pt;"></span>
            <span id="time-text" style="font-size: 15pt; margin-left: 20px;"></span>
        </div>
        <div id="board-wrapper"></div>
    </div>

    <script>
        oncontextmenu = function(event){
            event.preventDefault();
        }

        let lobby = document.getElementById('lobby');
        let gameContainer = document.getElementById('game-container');
        let boardWrapper = document.getElementById('board-wrapper');
        let infoText = document.getElementById('info-text');
        let flagText = document.getElementById('flag-text');
        let timeText = document.getElementById('time-text');
        let timerInterval; 
        let seconds = 0;  
        
        let w, h, mineN, mat, visited, gameover, rooms, findN, flagN;

        getLeaderboard();

        function startGame(width, height, minesCount) {
            w = width;
            h = height;
            mineN = minesCount;
            flagN = mineN;
            
            lobby.classList.add('hidden');
            gameContainer.classList.remove('hidden');
            
            initGame();
        }

        function backToLobby() {
            infoText.textContent = "";
            gameContainer.classList.add('hidden');
            lobby.classList.remove('hidden');
            boardWrapper.innerHTML = "";
            getLeaderboard();
        }

        function initGame() {
            gameover = 0;
            findN = 0;
            mat = new Array(h);
            visited = new Array(h);
            rooms = [];
            flagText.textContent = `🚩: ${flagN}`;

            for(let i=0; i<h; i++){
                mat[i] = new Array(w).fill(0);
                visited[i] = new Array(w).fill(0);
            }

            let mines = [];
            for(let i=0; i<mineN; i++){
                while(1){
                    let a = Math.floor(Math.random() * h);
                    let b = Math.floor(Math.random() * w);
                    if(mat[a][b] === 0){
                        mat[a][b] = -1;
                        mines.push([a,b]);
                        break;
                    }
                }
            }

            // 칸 숫자 할당 (기존 로직 그대로 사용)
            for(let i=0; i<mineN; i++){
                let a = mines[i][0];
                let b = mines[i][1];
                if(a-1 >= 0){
                    if(mat[a-1][b] !== -1) mat[a-1][b] += 1;
                    if(b-1 >= 0 && mat[a-1][b-1] !== -1) mat[a-1][b-1] += 1;
                    if(b+1 < w && mat[a-1][b+1] !== -1) mat[a-1][b+1] += 1;
                }
                if(a+1 < h){
                    if(mat[a+1][b] !== -1) mat[a+1][b] += 1;
                    if(b-1 >= 0 && mat[a+1][b-1] !== -1) mat[a+1][b-1] += 1;
                    if(b+1 < w && mat[a+1][b+1] !== -1) mat[a+1][b+1] += 1;
                }
                if(b-1 >= 0 && mat[a][b-1] !== -1) mat[a][b-1] += 1;
                if(b+1 < w && mat[a][b+1] !== -1) mat[a][b+1] += 1;
            }

            // 게임판 생성
            let t = document.createElement('table');
            for(let i=0; i<h; i++){
                let tr = document.createElement('tr');
                let temp = [];
                for(let j=0; j<w; j++){
                    let td = document.createElement('td');
                    td.classList.add('block');
                    td.innerText = " ";
                    
                    td.onclick = function(){
                        if(gameover) return;
                        if(this.classList.contains('block')){
                            if(mat[i][j] === -1){
                                this.innerText = "💣";
                                gameover = 1;
                                infoText.textContent = "GAME OVER";
                                stopTimer();
                                alert('Game Over!');
                            } else {
                                DFS(i, j);
                            }
                        }
                    }

                    td.oncontextmenu = function(){
                        if(gameover) return;
                        if(!this.classList.contains('flag')){
                            this.innerText = "🚩";
                            this.classList.add('flag');
                            flagText.textContent = `🚩: ${--flagN}`;
                        } else {
                            this.innerText = " ";
                            this.classList.remove('flag');
                            flagText.textContent = `🚩: ${++flagN}`;
                        }
                    }
                    temp.push(td);
                    tr.appendChild(td);
                }
                rooms.push(temp);
                t.appendChild(tr);
            }
            boardWrapper.appendChild(t);
            startTimer();
        }

        function DFS(i, j){
            findN += 1;
            if(findN === w*h-mineN){
                gameover = 1;
                infoText.textContent = "VICTORY";
                stopTimer();
                let name = prompt('Victory! 이름을 입력하세요');
                if(w===10){
                    saveScore(name, seconds, 'easy');
                }
                else if(w===18){
                    saveScore(name, seconds, 'normal');
                }
                else{
                    saveScore(name, seconds, 'hard');
                }
                
                
            }
            rooms[i][j].classList.remove('block');
            visited[i][j] = 1;
            if(mat[i][j] !== 0){
                rooms[i][j].innerText = mat[i][j];
                rooms[i][j].classList.add(`c${mat[i][j]}`);
                return;
            }
            
            // 상하좌우 및 대각선 탐색
            let dx = [-1, 1, 0, 0, -1, 1, -1, 1];
            let dy = [0, 0, 1, -1, -1, -1, 1, 1];

            for(let k=0; k<8; k++){
                let ni = i + dx[k];
                let nj = j + dy[k];
                if(ni>=0 && ni<h && nj>=0 && nj<w && !visited[ni][nj] && mat[ni][nj] !== -1){
                    DFS(ni, nj);
                }
            }
        }

        function startTimer() {
            stopTimer(); 
            seconds = 0;
            timeText.innerText = `⏱️: ${seconds}`;

            timerInterval = setInterval(() => {
                timeText.innerText = `⏱️: ${++seconds}`;
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
        }

        async function getLeaderboard() {
            const response = await fetch('http://localhost:4000/leaderboard');
            const data = await response.json();

            const li = ["easy", "normal", "hard"];

            let rankText = document.getElementsByClassName('rank-list');
            
            for(let i=0; i<3; i++){
                let ranks = "";
                data[li[i]].forEach((user, index) => {
                    console.log(`${index + 1}위: ${user.username} - ${user.time}초`);
                    ranks += `${index + 1}위: ${user.username} - ${user.time}초<br>`
                });

                rankText[i].innerHTML = ranks;
            }
            
        }
        async function saveScore(nickname, scoreTime, diff) {
            try {
                const response = await fetch('http://localhost:4000/submit-score', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json', 
                    },
                    body: JSON.stringify({
                        username: nickname,
                        time: scoreTime,
                        difficulty: diff
                    })
                });

                if (!response.ok) {
                    throw new Error("서버 응답 에러!");
                }

                const result = await response.json();
                console.log("서버에 저장 성공:", result);

            } catch (error) {
                console.error("데이터 전송 실패:", error);
                alert("점수 저장에 실패했습니다.");
            }
        }
    </script>
</body>
</html>
